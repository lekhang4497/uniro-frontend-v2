name: Electron build

on:
  push:
    branches:
      - feat/chatgpt-design-rework
      - main
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Repo intentionally gitignores package-lock.json (see .gitignore),
        # so `npm ci` would fail. Use `npm install` instead.
        run: npm install --no-audit --no-fund

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Package Electron app
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:pack

      - name: Build & publish Electron app (release)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --config electron/builder.json --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uniro-${{ matrix.os }}
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
            release/win-unpacked/**/*
            release/mac/**/*
            release/linux-unpacked/**/*
          retention-days: 14
          if-no-files-found: warn
